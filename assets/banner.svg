<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d"/>
      <stop offset="50%" stop-color="#070b19"/>
      <stop offset="100%" stop-color="#02050f"/>
    </linearGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007a"/>
      <stop offset="100%" stop-color="#7928ca"/>
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00dfd8"/>
      <stop offset="100%" stop-color="#007cf0"/>
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .title {
      font-family: 'Outfit', 'Inter', 'Segoe UI', sans-serif;
      font-weight: 800;
      font-size: 54px;
      fill: url(#secondaryGrad);
      filter: drop-shadow(0px 4px 8px rgba(0, 223, 216, 0.3));
    }
    .subtitle {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-weight: 400;
      font-size: 20px;
      fill: #a0aec0;
      letter-spacing: 2px;
    }
    .tagline {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-weight: 600;
      font-size: 16px;
      fill: url(#primaryGrad);
      letter-spacing: 4px;
    }
    /* Dynamic Animations */
    .pulse-glow {
      animation: pulse 4s infinite ease-in-out;
    }
    .orbit-node {
      animation: orbit 12s infinite linear;
      transform-origin: 950px 200px;
    }
    .orbit-node-reverse {
      animation: orbit-rev 16s infinite linear;
      transform-origin: 950px 200px;
    }
    .float-path {
      stroke-dasharray: 8 8;
      animation: dash 30s infinite linear;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.02); }
    }
    @keyframes orbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes orbit-rev {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes dash {
      to { stroke-dashoffset: -1000; }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Interactive Dynamic Background Grid -->
  <g stroke="#1a2035" stroke-width="1" opacity="0.5">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350"/>
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400"/>
  </g>

  <!-- Glowing background blobs -->
  <circle cx="150" cy="200" r="180" fill="#7928ca" opacity="0.15" filter="url(#glow)" class="pulse-glow"/>
  <circle cx="950" cy="200" r="220" fill="#007cf0" opacity="0.12" filter="url(#glow)" class="pulse-glow"/>

  <!-- Orbits and Network Links (Dynamic aspect) -->
  <g stroke="url(#secondaryGrad)" stroke-width="1.5" fill="none" opacity="0.6">
    <circle cx="950" cy="200" r="130" stroke-dasharray="5 10"/>
    <circle cx="950" cy="200" r="70" stroke-dasharray="4 6"/>
    <circle cx="950" cy="200" r="180" class="float-path"/>
  </g>

  <!-- Network Nodes -->
  <g class="orbit-node">
    <circle cx="950" cy="70" r="8" fill="#00dfd8" filter="url(#glow)"/>
    <line x1="950" y1="70" x2="950" y2="200" stroke="#00dfd8" stroke-width="0.5" opacity="0.3"/>
  </g>
  <g class="orbit-node-reverse">
    <circle cx="880" cy="200" r="6" fill="#ff007a" filter="url(#glow)"/>
    <circle cx="1020" cy="200" r="10" fill="#7928ca" filter="url(#glow)"/>
  </g>
  
  <circle cx="950" cy="200" r="25" fill="url(#primaryGrad)" filter="url(#glow)"/>
  <text x="950" y="207" font-family="'Inter', sans-serif" font-weight="bold" font-size="18" fill="#ffffff" text-anchor="middle">AI</text>

  <!-- Left Content (Text) -->
  <g transform="translate(100, 140)">
    <text x="0" y="0" class="tagline">ACTIVE NEURO-SYMBOLIC REASONING</text>
    <text x="0" y="60" class="title">Awesome RaCoT</text>
    <text x="0" y="100" class="subtitle">Retrieval-Augmented Chain-of-Thought</text>
    
    <!-- Short Info Badges representation in SVG -->
    <rect x="0" y="130" width="120" height="28" rx="14" fill="#1e293b"/>
    <text x="60" y="148" font-family="sans-serif" font-size="12" fill="#00dfd8" text-anchor="middle" font-weight="bold">System 2 Scaling</text>
    
    <rect x="135" y="130" width="120" height="28" rx="14" fill="#1e293b"/>
    <text x="195" y="148" font-family="sans-serif" font-size="12" fill="#ff007a" text-anchor="middle" font-weight="bold">Fact-Checking</text>
  </g>

</svg>
